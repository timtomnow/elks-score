<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elks Score</title>
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#14452F">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Elks Score">
  <link rel="apple-touch-icon" href="icon.svg">
  <script src="config.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:  #14452F;
      --green2: #1B5E3F;
      --gold:   #F2A900;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--green);
      min-height: 100vh;
      padding: 16px 16px 40px;
      -webkit-font-smoothing: antialiased;
    }

    #app { max-width: 440px; margin: 0 auto; }

    /* ── Header ── */
    .header { text-align: center; padding: 20px 0 18px; }
    .logo-img { width: 68px; height: 68px; object-fit: contain; }
    .header h1 { color: #fff; font-size: 20px; font-weight: 700; margin-top: 8px; }
    .header .date { color: rgba(255,255,255,.55); font-size: 13px; margin-top: 3px; }

    /* ── Cards ── */
    .card { background: #fff; border-radius: 16px; overflow: hidden; margin-bottom: 12px; box-shadow: 0 2px 16px rgba(0,0,0,.22); }
    .sec { padding: 14px 16px; }
    .sec + .sec { border-top: 1px solid #f2f2f2; }
    .sec-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: #b0b0b0; margin-bottom: 10px; }

    /* ── Badges ── */
    .badge { display: inline-block; padding: 3px 10px; border-radius: 10px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; }
    .b-live    { background: #ff3b30; color: #fff; }
    .b-final   { background: #e8e8ed; color: #555; }
    .b-preview { background: var(--green2); color: #fff; }
    .b-off     { background: #e8e8ed; color: #666; }

    /* ── Score row ── */
    .score-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .score-row { display: flex; align-items: center; justify-content: space-between; }
    .team-col { flex: 1; text-align: center; }
    .team-abbr { font-size: 12px; font-weight: 700; color: #999; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 2px; display: flex; align-items: center; justify-content: center; gap: 5px; }
    .poss-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--gold); display: inline-block; }
    .score-num { font-size: 50px; font-weight: 800; color: #1c1c1e; line-height: 1; }
    .score-num.dim { color: #ccc; }
    .score-num.hi  { color: var(--green); }
    .score-dash { font-size: 30px; color: #ddd; font-weight: 300; padding: 0 6px; flex-shrink: 0; }
    .score-vs   { font-size: 16px; color: #ccc; padding: 0 12px; flex-shrink: 0; }
    .team-record { font-size: 11px; color: #c0c0c0; margin-top: 2px; }
    .team-name { font-size: 10px; color: #c8c8c8; margin-top: 1px; }

    /* ── Live clock row ── */
    .clock-row { display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 13px; color: #888; font-weight: 600; }
    .clock-row .period { color: var(--green2); }

    /* ── Game meta / link ── */
    .game-time { text-align: center; font-size: 15px; font-weight: 600; color: #333; }
    .game-sub  { text-align: center; font-size: 12px; color: #aaa; margin-top: 3px; }

    /* ── Expandable game details ── */
    .game-details { border-top: 1px solid #f2f2f2; }
    .game-details summary { list-style: none; cursor: pointer; padding: 11px 16px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: #999; display: flex; align-items: center; justify-content: space-between; -webkit-tap-highlight-color: transparent; }
    .game-details summary::-webkit-details-marker { display: none; }
    .game-details summary::after { content: '›'; color: #ccc; font-size: 17px; transition: transform .2s; }
    .game-details[open] summary::after { transform: rotate(90deg); }
    .gd-body { padding: 0 16px 12px; }
    .gd-row { display: flex; justify-content: space-between; gap: 12px; font-size: 12px; padding: 6px 0; border-top: 1px solid #f7f7f7; }
    .gd-row:first-child { border-top: none; }
    .gd-k { color: #aaa; }
    .gd-v { color: #444; font-weight: 600; text-align: right; }

    /* ── CFL.ca source link ── */
    .cfl-link { display: flex; align-items: center; gap: 10px; background: #f7f7f9; border-radius: 12px; padding: 11px 13px; text-decoration: none; -webkit-tap-highlight-color: transparent; }
    .cfl-link:active { background: #ececf0; }
    .cfl-mark { font-size: 11px; font-weight: 800; color: #fff; background: var(--green2); border-radius: 6px; padding: 3px 7px; letter-spacing: .2px; flex-shrink: 0; }
    .cfl-text { display: flex; flex-direction: column; line-height: 1.25; min-width: 0; }
    .cfl-text b { font-size: 13px; font-weight: 700; color: #1c1c1e; }
    .cfl-text span { font-size: 11px; color: #999; }
    .cfl-arrow { margin-left: auto; color: #c4c4c4; font-size: 15px; flex-shrink: 0; }

    /* ── Recent results ── */
    .res-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-top: 1px solid #f2f2f2; text-decoration: none; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .sec-title + .res-row { border-top: none; }
    .res-row:active { background: #fafafa; }
    .res-badge { width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0; font-size: 10px; font-weight: 800; color: #fff; display: flex; align-items: center; justify-content: center; }
    .res-w { background: var(--green2); }
    .res-l { background: #cfcfcf; }
    .res-t { background: #b8b8b8; }
    .res-main { flex: 1; min-width: 0; }
    .res-line { display: flex; align-items: center; gap: 5px; }
    .res-sub  { font-size: 10px; color: #aaa; margin-top: 2px; }

    /* ── Standings ── */
    .st-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .st-table th { color: #bbb; font-size: 11px; font-weight: 600; text-align: right; padding: 3px 0; }
    .st-table th:first-child { text-align: left; }
    .st-table td { padding: 7px 0; color: #666; text-align: right; border-top: 1px solid #f5f5f5; }
    .st-table td:first-child { text-align: left; font-weight: 600; color: #1c1c1e; }
    .st-table .elks td { color: var(--green); font-weight: 700; }
    .st-table .elks td:first-child { color: var(--green); }
    .st-table td.pts { font-weight: 700; color: var(--green); }
    .div-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: var(--gold); margin: 0 0 8px; }
    .sec + .sec .div-title { margin-top: 0; }

    /* ── Scoreboard rows (other games) ── */
    .og-row { display: flex; align-items: center; padding: 9px 0; border-top: 1px solid #f2f2f2; gap: 6px; width: 100%; text-decoration: none; -webkit-tap-highlight-color: transparent; }
    .og-row:first-child { border-top: none; }
    .og-row:active { background: #fafafa; }
    .og-teams { display: flex; align-items: center; gap: 5px; flex: 1; min-width: 0; }
    .og-team { font-size: 12px; font-weight: 700; color: #1c1c1e; width: 34px; flex-shrink: 0; }
    .og-team.elks { color: var(--green); }
    .og-score { font-size: 14px; font-weight: 700; color: #1c1c1e; min-width: 16px; text-align: center; }
    .og-score.dim { color: #c4c4c4; }
    .og-dash { font-size: 11px; color: #ccc; }
    .og-status { margin-left: auto; font-size: 10px; font-weight: 700; flex-shrink: 0; white-space: nowrap; text-align: right; }
    .og-live  { color: #ff3b30; }
    .og-final { color: #999; font-weight: 600; }
    .og-pre   { color: var(--green2); }
    .og-chev  { color: #ddd; font-size: 15px; flex-shrink: 0; margin-left: 2px; }

    /* ── Upcoming ── */
    .up-row { padding: 10px 0; border-top: 1px solid #f2f2f2; }
    .up-row:first-child { border-top: none; }
    .up-match { font-size: 13px; font-weight: 700; color: #1c1c1e; }
    .up-meta  { font-size: 11px; color: #aaa; margin-top: 2px; }

    /* ── Game stats (Tier 2: Genius Sports box score) ── */
    .gs-score { display: flex; align-items: center; justify-content: center; gap: 8px; margin: 2px 0 1px; }
    .gs-ab { font-size: 13px; font-weight: 800; letter-spacing: .5px; }
    .gs-num { font-size: 20px; font-weight: 800; color: #1c1c1e; line-height: 1; }
    .gs-dash { font-size: 14px; color: #ddd; font-weight: 300; }
    .gs-sub { text-align: center; font-size: 11px; color: #aaa; margin-bottom: 12px; }
    .a-clr { color: var(--gold); }
    .h-clr { color: var(--green2); }

    .ts-row { padding: 8px 0; border-top: 1px solid #f5f5f5; }
    .ts-row:first-child { border-top: none; }
    .ts-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 5px; }
    .ts-val { font-size: 13px; font-weight: 700; color: #1c1c1e; min-width: 48px; }
    .ts-val.r { text-align: right; }
    .ts-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .4px; color: #b0b0b0; }
    .ts-bar { display: flex; height: 5px; border-radius: 3px; overflow: hidden; background: #f0f0f0; }
    .ts-bar-a { background: var(--gold); }
    .ts-bar-h { background: var(--green2); }

    .pl-cat { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: #c4c4c4; margin: 14px 0 1px; }
    .pl-row { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-top: 1px solid #f7f7f7; }
    .pl-team { font-size: 10px; font-weight: 800; width: 30px; flex-shrink: 0; letter-spacing: .3px; }
    .pl-name { font-size: 12px; font-weight: 600; color: #1c1c1e; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pl-name small { color: #c0c0c0; font-weight: 600; }
    .pl-stat { font-size: 11px; color: #888; flex-shrink: 0; text-align: right; }

    /* Clickable Game Stats card → opens the full box-score modal */
    .gs-card { cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .gs-card:active { background: #fcfcfc; }
    .gs-more { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; padding-top: 11px; border-top: 1px solid #f2f2f2; font-size: 12px; font-weight: 700; color: var(--green2); }
    .gs-more::after { content: '›'; color: #ccc; font-size: 17px; }

    /* ── Game modal (full box score: team / player / play-by-play) ── */
    #gm-bd { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 310; opacity: 0; pointer-events: none; transition: opacity .25s; }
    #gm-bd.open { opacity: 1; pointer-events: auto; }
    #gm-sh { position: fixed; left: 0; right: 0; bottom: 0; z-index: 311; background: #fff; border-radius: 20px 20px 0 0; max-height: 92vh; display: flex; flex-direction: column; transform: translateY(102%); transition: transform .3s cubic-bezier(.25,.46,.45,.94); box-shadow: 0 -8px 32px rgba(0,0,0,.2); }
    #gm-sh.open { transform: translateY(0); }
    .gm-head { display: flex; align-items: center; justify-content: space-between; padding: 8px 16px 4px; flex-shrink: 0; }
    .gm-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: #b0b0b0; }
    .gm-close { background: none; border: none; font-size: 24px; color: #bbb; cursor: pointer; line-height: 1; padding: 0 0 2px 16px; }
    #gm-score { flex-shrink: 0; padding: 0 16px; }
    .gm-tabs { display: flex; gap: 5px; padding: 8px 12px 10px; border-bottom: 1px solid #f0f0f0; flex-shrink: 0; }
    .gm-tab { flex: 1; text-align: center; padding: 9px 4px; font-size: 11px; font-weight: 700; color: #888; background: #f4f4f6; border: none; border-radius: 9px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .gm-tab.active { background: var(--green); color: #fff; }
    .gm-body { overflow-y: auto; flex: 1; padding: 10px 16px 32px; -webkit-overflow-scrolling: touch; }
    .gm-body .pl-cat:first-child { margin-top: 4px; }

    /* Play-by-play */
    .pbp-filters { position: sticky; top: 0; background: #fff; padding: 0 0 10px; z-index: 5; }
    .pbp-btns { display: flex; gap: 6px; margin-bottom: 6px; }
    .pbp-btns:last-child { margin-bottom: 0; }
    .pbp-btn { flex: 1; padding: 7px 4px; font-size: 11px; font-weight: 700; color: #888; background: #f4f4f6; border: 1px solid #ececec; border-radius: 8px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .pbp-btn.on { background: var(--green); color: #fff; border-color: var(--green); }
    .pbp-q { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: .6px; color: var(--gold); margin: 14px 0 2px; padding: 4px 0; }
    .pbp-q:first-child { margin-top: 0; }
    .pbp-row { display: flex; gap: 8px; padding: 8px 0; border-top: 1px solid #f5f5f5; align-items: baseline; }
    .pbp-row.score { background: #fbfaf3; margin: 0 -8px; padding: 8px; border-radius: 8px; border-top: none; }
    .pbp-clock { font-size: 11px; font-weight: 700; color: #c0c0c0; width: 38px; flex-shrink: 0; }
    .pbp-team { font-size: 10px; font-weight: 800; width: 28px; flex-shrink: 0; }
    .pbp-desc { font-size: 12px; color: #555; line-height: 1.4; flex: 1; min-width: 0; }
    .pbp-row.score .pbp-desc { color: #1c1c1e; font-weight: 600; }

    /* ── Footer ── */
    .footer { text-align: center; padding: 4px 0 8px; }
    .refresh-btn { background: rgba(255,255,255,.15); color: #fff; border: 1px solid rgba(255,255,255,.25); padding: 10px 28px; border-radius: 20px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .refresh-btn:active { background: rgba(255,255,255,.25); }
    .updated { font-size: 11px; color: rgba(255,255,255,.35); margin-top: 8px; }
    .copyright { display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 11px; color: rgba(255,255,255,.3); margin-top: 8px; }
    .copyright a { color: rgba(255,255,255,.7); text-decoration: underline; text-underline-offset: 2px; }
    .copyright a:hover { color: #fff; }
    .settings-btn { background: none; color: rgba(255,255,255,.4); border: none; padding: 2px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; line-height: 0; }
    .settings-btn:active { color: #fff; }

    /* ── Settings overlay ── */
    #set-bd { position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:300; opacity:0; pointer-events:none; transition:opacity .25s; }
    #set-bd.open { opacity:1; pointer-events:auto; }
    #set-sh { position:fixed; left:0; right:0; bottom:0; z-index:301; background:#f2f2f7; border-radius:20px 20px 0 0; max-height:90vh; display:flex; flex-direction:column; transform:translateY(102%); transition:transform .3s cubic-bezier(.25,.46,.45,.94); box-shadow:0 -8px 32px rgba(0,0,0,.2); }
    #set-sh.open { transform:translateY(0); }
    .ov-handle { width:36px; height:4px; background:#e0e0e0; border-radius:2px; margin:10px auto 0; flex-shrink:0; }
    .set-head { display:flex; align-items:center; gap:8px; padding:10px 16px; border-bottom:1px solid #e4e4ea; flex-shrink:0; }
    .set-back { background:none; border:none; font-size:14px; font-weight:600; color:var(--green); cursor:pointer; padding:0; line-height:1; }
    .set-title { font-size:15px; font-weight:700; color:#1c1c1e; flex:1; }
    .set-close { background:none; border:none; font-size:24px; color:#bbb; cursor:pointer; line-height:1; padding:0 0 2px 8px; }
    .set-body { overflow-y:auto; flex:1; padding:14px; -webkit-overflow-scrolling:touch; }

    /* Cards */
    .set-card { background:#fff; border-radius:14px; padding:16px; margin-bottom:14px; }
    .set-card:last-child { margin-bottom:0; }
    .set-card-title { font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.6px; color:#8a8a8e; margin:0 0 12px; }
    .set-app-name { font-size:16px; font-weight:700; color:#1c1c1e; margin-bottom:6px; }
    .set-desc { font-size:13px; line-height:1.5; color:#666; margin-bottom:14px; }
    .set-links { display:flex; flex-direction:column; gap:10px; }
    .set-link { display:inline-flex; align-items:center; gap:7px; color:#1c1c1e; text-decoration:none; font-weight:600; font-size:13.5px; width:fit-content; }
    .set-link.accent { color:var(--green); }
    .set-copy { margin-top:14px; padding-top:12px; border-top:1px solid #f0f0f0; font-size:12px; color:#aaa; }

    /* Help index */
    .help-card-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:4px; }
    .help-viewall { font-size:12px; font-weight:700; color:var(--green); text-decoration:none; }
    .help-cat-link { display:flex; align-items:center; gap:4px; font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.5px; color:var(--gold); text-decoration:none; margin:16px 0 4px; }
    .help-cat-link:first-of-type { margin-top:10px; }
    .help-item { display:block; padding:10px 0; border-top:1px solid #f3f3f5; text-decoration:none; cursor:pointer; }
    .help-item-title { font-size:14px; font-weight:600; color:#1c1c1e; }
    .help-item-title::after { content:'›'; float:right; color:#ccc; font-weight:700; }
    .help-item-sum { font-size:12px; color:#888; margin-top:2px; line-height:1.4; }
    .help-empty { font-size:13px; color:#999; line-height:1.5; }

    /* Breadcrumbs */
    .bc { display:flex; flex-wrap:wrap; align-items:center; gap:5px; font-size:12px; color:#999; margin:0 2px 12px; }
    .bc a { color:#666; font-weight:600; text-decoration:none; }
    .bc-cur { color:#1c1c1e; font-weight:600; }
    .bc-sep { color:#ccc; }

    /* Table of contents box */
    .toc-box { background:#f7f7f9; border:1px solid #ececf0; border-radius:12px; padding:12px 14px; margin-bottom:16px; }
    .toc-title { font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.5px; color:#9a9aa0; margin-bottom:6px; }
    .toc-box ul { list-style:none; margin:0; padding:0; }
    .toc-box li { margin:2px 0; }
    .toc-box a { display:block; font-size:13px; color:#555; text-decoration:none; padding:2px 0; }
    .toc-box a.toc-sec { font-size:13px; font-weight:800; color:#1c1c1e; margin-top:6px; }
    .toc-box a.toc-guide { font-weight:600; color:#333; }
    .toc-steps { border-left:1px solid #e4e4ea; margin:2px 0 6px 4px !important; padding-left:8px !important; }
    .toc-steps a { font-size:12px; color:#888; }
    .toc-sub { padding-left:10px !important; }

    /* Section / full-docs headers */
    .docs-sec { margin-top:20px; }
    .docs-sec-title { font-size:18px; font-weight:800; color:var(--green); border-bottom:1px solid #eee; padding-bottom:6px; margin:0 0 14px; }
    .guide-sec { margin-top:18px; }
    .guide-sec + .guide-sec, .docs-sec .guide-sec { border-top:1px solid #f2f2f2; padding-top:16px; }
    .guide-sec-title { font-size:15px; font-weight:800; color:#1c1c1e; margin:0 0 2px; scroll-margin-top:8px; }
    .guide-sec-sum { font-size:12px; color:#888; margin:0 0 8px; line-height:1.4; }
    section[id], article[id] { scroll-margin-top:8px; }

    /* Guide body (process / section / full-docs articles) */
    .guide-body { font-size:13px; line-height:1.6; color:#444; }
    .guide-body h1 { font-size:18px; font-weight:800; color:var(--green); margin:0 0 12px; }
    .guide-body h2 { font-size:14px; font-weight:700; color:#1c1c1e; margin:16px 0 6px; border-bottom:1px solid #f0f0f0; padding-bottom:4px; scroll-margin-top:8px; }
    .guide-body h3 { font-size:13px; font-weight:700; color:#1c1c1e; margin:12px 0 4px; scroll-margin-top:8px; }
    .guide-body p { margin:0 0 8px; }
    .guide-body ul, .guide-body ol { padding-left:20px; margin:0 0 8px; }
    .guide-body li { margin-bottom:4px; }
    .guide-body a { color:var(--green); }
    .guide-body strong { color:#1c1c1e; }
    .guide-body code { background:#f5f5f7; border-radius:4px; padding:1px 5px; font-size:12px; }

    /* ── States ── */
    .loading { color: #aaa; font-size: 14px; text-align: center; padding: 28px; }
    .err     { color: #ff3b30; font-size: 13px; text-align: center; padding: 20px; line-height: 1.5; }
    .off-msg { color: #888; font-size: 15px; text-align: center; padding: 8px 0 4px; }
  </style>
</head>
<body>
<div id="app">
  <header class="header">
    <img class="logo-img"
      src="https://cflscoreboard.cfl.ca/media/squads/114347.png"
      onerror="this.onerror=null;this.src='icon.svg'"
      alt="Edmonton Elks">
    <h1>Edmonton Elks</h1>
    <p class="date" id="date-label"></p>
  </header>

<script>
  // ── Constants ───────────────────────────────────────────────────────────────
  const ELKS_ID = CONFIG.TEAM_ID;                          // Edmonton Elks (Genius Sports squad id)
  const BASE    = CONFIG.CFL_API_BASE + '/json/scoreboard'; // via Cloudflare Worker CORS proxy

  // CFL divisions (squad id → division)
  const WEST = new Set([93775, 112939, 114347, 106752, 110380]); // BC, CGY, EDM, SSK, WPG
  const EAST = new Set([83579, 86680, 88019, 122345]);           // HAM, MTL, OTT, TOR

  // Game statuses that mean the game is in progress
  const LIVE_STATUSES = new Set([
    'first_quarter', 'second_quarter', 'half_time',
    'third_quarter', 'fourth_quarter', 'overtime', 'pre_match',
  ]);
  // Period label per status
  const PERIOD_LABEL = {
    first_quarter: '1st', second_quarter: '2nd', half_time: 'Half',
    third_quarter: '3rd', fourth_quarter: '4th', overtime: 'OT', pre_match: 'Pre',
  };

  const isLive      = g => LIVE_STATUSES.has(g.status);
  const isComplete  = g => g.status === 'complete';
  const isScheduled = g => g.status === 'scheduled';
  const isCanceled  = g => g.status === 'canceled';

  // ── Helpers ─────────────────────────────────────────────────────────────────
  function fmtTime(utc) {
    if (!utc) return '';
    return new Date(utc).toLocaleTimeString('en-CA', { hour: 'numeric', minute: '2-digit', timeZoneName: 'short' });
  }
  function fmtDate(utc, opts) {
    if (!utc) return '';
    return new Date(utc).toLocaleDateString('en-CA', opts || { weekday: 'short', month: 'short', day: 'numeric' });
  }

  // CFL points: win = 2, tie = 1, loss = 0
  const points = s => (s.wins ?? 0) * 2 + (s.draw ?? 0);
  function record(s) {
    if (!s) return '';
    const t = s.draw ?? 0;
    return t > 0 ? `${s.wins}–${s.loss}–${t}` : `${s.wins}–${s.loss}`;
  }

  // Build the official CFL gametracker / preview link for a game
  function gameTrackerLink(g) {
    if (!g.cflId) return null;
    const slug = name => (name || '').toLowerCase().replaceAll(' ', '-');
    const home = slug(g.homeSquad?.name);
    const away = slug(g.awaySquad?.name);
    const state = isLive(g) ? '#gametracker' : isComplete(g) ? '#boxscore' : '#preview';
    return `https://www.cfl.ca/games/${g.cflId}/${home}-vs-${away}/${state}`;
  }

  // Branded link out to the official CFL.ca game page — makes it obvious that
  // deeper stats (box score, play-by-play) live on cfl.ca, not in this app.
  function cflLink(g) {
    const href = gameTrackerLink(g);
    if (!href) return '';
    let label = 'Game Preview', sub = 'Matchup & preview on CFL.ca';
    if (isLive(g))          { label = 'Live Game Tracker'; sub = 'Live stats & play-by-play on CFL.ca'; }
    else if (isComplete(g)) { label = 'Box Score & Recap'; sub = 'Full stats & recap on CFL.ca'; }
    return `<a class="cfl-link" href="${href}" target="_blank" rel="noopener">
      <span class="cfl-mark">CFL.ca</span>
      <span class="cfl-text"><b>${label}</b><span>${sub}</span></span>
      <span class="cfl-arrow">↗</span>
    </a>`;
  }

  // Expandable details block surfacing the extra data the feed provides
  // (round/pre-season label, kickoff, and live timeouts) — no betting data.
  function gameDetails(g) {
    const rows = [];
    if (g._round?.name) rows.push(['Round', g._round.name]);
    rows.push([
      isComplete(g) ? 'Played' : 'Kickoff',
      `${fmtDate(g.date, { weekday: 'short', month: 'short', day: 'numeric' })} · ${fmtTime(g.date)}`,
    ]);
    if (isLive(g) && g.timeouts) {
      const to = n => n ?? '—';
      rows.push(['Timeouts left', `${g.awaySquad.shortName} ${to(g.timeouts.away)} · ${g.homeSquad.shortName} ${to(g.timeouts.home)}`]);
    }
    if (!rows.length) return '';
    const body = rows
      .map(([k, v]) => `<div class="gd-row"><span class="gd-k">${k}</span><span class="gd-v">${v}</span></div>`)
      .join('');
    return `<details class="game-details"><summary>Game details</summary><div class="gd-body">${body}</div></details>`;
  }

  // ── API ───────────────────────────────────────────────────────────────────
  async function getJSON(path) {
    const r = await fetch(`${BASE}/${path}`);   // gzip handled transparently by the browser
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return r.json();
  }
  const fetchSquads = () => getJSON('squads.json');
  const fetchRounds = () => getJSON('rounds.json');

  // ── Global state ────────────────────────────────────────────────────────────
  let SQUADS = {};        // id → squad
  let GAMES_BY_ID = {};   // fixtureId (string) → game, for the box-score modal

  // Flatten every game out of the rounds, tagging each with its round info
  function allGames(rounds) {
    const games = [];
    for (const r of rounds) {
      for (const t of (r.tournaments ?? [])) {
        if (t.isHidden) continue;
        games.push({ ...t, _round: r });
      }
    }
    return games;
  }

  function involvesElks(g) {
    return g.homeSquad?.id === ELKS_ID || g.awaySquad?.id === ELKS_ID;
  }

  // Pick the most relevant Elks game: live > next scheduled > most recent complete
  function featuredElksGame(games) {
    const elks = games.filter(involvesElks);
    const live = elks.find(isLive);
    if (live) return live;
    const now = Date.now();
    const upcoming = elks
      .filter(g => isScheduled(g) && new Date(g.date).getTime() >= now)
      .sort((a, b) => new Date(a.date) - new Date(b.date));
    if (upcoming.length) return upcoming[0];
    const past = elks
      .filter(isComplete)
      .sort((a, b) => new Date(b.date) - new Date(a.date));
    return past[0] || null;
  }

  // Pick which round to show on the scoreboard: any with a live game,
  // else the round whose window contains now, else next upcoming, else last.
  function activeRound(rounds) {
    const live = rounds.find(r => (r.tournaments ?? []).some(isLive));
    if (live) return live;
    const now = Date.now();
    const within = rounds.find(r => {
      const s = new Date(r.startDate).getTime();
      const e = new Date(r.endDate).getTime();
      return now >= s && now <= e;
    });
    if (within) return within;
    const upcoming = rounds
      .filter(r => new Date(r.startDate).getTime() >= now)
      .sort((a, b) => new Date(a.startDate) - new Date(b.startDate));
    if (upcoming.length) return upcoming[0];
    return rounds[rounds.length - 1] || null;
  }

  // ── Featured game card ────────────────────────────────────────────────────
  function renderFeatured(g) {
    if (!g) {
      return `<div class="card"><div class="sec">
        <span class="badge b-off">Off Season</span>
        <div class="off-msg">No Elks games scheduled right now.</div>
      </div></div>`;
    }

    const aw = g.awaySquad, hm = g.homeSquad;
    const awSq = SQUADS[aw.id], hmSq = SQUADS[hm.id];
    const live = isLive(g), final = isComplete(g), sched = isScheduled(g);

    const awWon = final && g.winner === aw.id;
    const hmWon = final && g.winner === hm.id;
    const possAway = live && g.possession === 'Away';
    const possHome = live && g.possession === 'Home';

    let badgeCls = 'b-off', badgeTxt = g.status;
    if (live)  { badgeCls = 'b-live';    badgeTxt = 'Live'; }
    if (final) { badgeCls = 'b-final';   badgeTxt = 'Final'; }
    if (sched) { badgeCls = 'b-preview'; badgeTxt = g._round?.name || 'Upcoming'; }
    if (isCanceled(g)) { badgeCls = 'b-off'; badgeTxt = 'Canceled'; }

    const showScore = live || final;
    const awScore = showScore ? (aw.score ?? 0) : '—';
    const hmScore = showScore ? (hm.score ?? 0) : '—';

    let html = `<div class="sec">
      <div class="score-header">
        <span class="badge ${badgeCls}">${badgeTxt}</span>
        ${live ? `<span class="clock-row"><span class="period">${PERIOD_LABEL[g.status] || ''}</span><span>${g.clock || ''}</span></span>` : ''}
        ${sched ? `<span style="font-size:13px;font-weight:600;color:#333">${fmtTime(g.date)}</span>` : ''}
      </div>
      <div class="score-row">
        <div class="team-col">
          <div class="team-abbr">${possAway ? '<span class="poss-dot"></span>' : ''}${aw.shortName}</div>
          <div class="score-num ${final && awWon ? 'hi' : final && !awWon ? 'dim' : ''}">${awScore}</div>
          <div class="team-record">${record(awSq)}</div>
        </div>
        ${sched ? `<span class="score-vs">@</span>` : `<span class="score-dash">–</span>`}
        <div class="team-col">
          <div class="team-abbr">${possHome ? '<span class="poss-dot"></span>' : ''}${hm.shortName}</div>
          <div class="score-num ${final && hmWon ? 'hi' : final && !hmWon ? 'dim' : ''}">${hmScore}</div>
          <div class="team-record">${record(hmSq)}</div>
        </div>
      </div>`;

    if (sched) {
      html += `<div style="margin-top:12px">
        <div class="game-time">${aw.name} @ ${hm.name}</div>
        <div class="game-sub">${fmtDate(g.date, { weekday: 'long', month: 'long', day: 'numeric' })}</div>
      </div>`;
    }
    html += `</div>`;

    html += gameDetails(g);

    const link = cflLink(g);
    if (link) {
      html += `<div class="sec" style="padding:12px 16px;border-top:1px solid #f2f2f2">${link}</div>`;
    }

    return `<div class="card">${html}</div>`;
  }

  // ── Standings card (by division, CFL points) ──────────────────────────────
  function divisionTable(title, ids) {
    const rows = Object.values(SQUADS)
      .filter(s => ids.has(s.id))
      .sort((a, b) => points(b) - points(a) || b.wins - a.wins || a.loss - b.loss);
    if (!rows.length) return '';
    const body = rows.map(s => {
      const gp = (s.wins ?? 0) + (s.loss ?? 0) + (s.draw ?? 0);
      const cls = s.id === ELKS_ID ? ' class="elks"' : '';
      return `<tr${cls}>
        <td>${s.name}</td>
        <td>${gp}</td>
        <td>${s.wins ?? 0}</td>
        <td>${s.loss ?? 0}</td>
        <td>${s.draw ?? 0}</td>
        <td class="pts">${points(s)}</td>
      </tr>`;
    }).join('');
    return `<div class="sec">
      <div class="div-title">${title}</div>
      <table class="st-table">
        <thead><tr><th>Team</th><th>GP</th><th>W</th><th>L</th><th>T</th><th>Pts</th></tr></thead>
        <tbody>${body}</tbody>
      </table>
    </div>`;
  }

  function renderStandings() {
    const west = divisionTable('West Division', WEST);
    const east = divisionTable('East Division', EAST);
    if (!west && !east) return '';
    return `<div class="card">
      <div class="sec" style="padding-bottom:6px"><div class="sec-title">CFL Standings</div></div>
      ${west}${east}
    </div>`;
  }

  // ── Scoreboard card (active week) ─────────────────────────────────────────
  function scoreRow(g) {
    const aw = g.awaySquad, hm = g.homeSquad;
    const live = isLive(g), final = isComplete(g);
    const showScore = live || final;

    let statusHtml;
    if (live)  statusHtml = `<span class="og-status og-live">${PERIOD_LABEL[g.status] || 'Live'}${g.clock ? ' · ' + g.clock : ''}</span>`;
    else if (final) statusHtml = `<span class="og-status og-final">Final</span>`;
    else if (isCanceled(g)) statusHtml = `<span class="og-status og-final">Canceled</span>`;
    else statusHtml = `<span class="og-status og-pre">${fmtTime(g.date)}</span>`;

    const awWon = final && g.winner === aw.id;
    const hmWon = final && g.winner === hm.id;
    const awCls = aw.id === ELKS_ID ? ' elks' : '';
    const hmCls = hm.id === ELKS_ID ? ' elks' : '';

    const scoreOrAt = showScore
      ? `<span class="og-score ${final && !awWon ? 'dim' : ''}">${aw.score ?? 0}</span><span class="og-dash">–</span><span class="og-score ${final && !hmWon ? 'dim' : ''}">${hm.score ?? 0}</span>`
      : `<span class="og-dash">@</span>`;

    const link = gameTrackerLink(g);
    const tag = link ? 'a' : 'div';
    const href = link ? ` href="${link}" target="_blank" rel="noopener"` : '';
    return `<${tag} class="og-row"${href}>
      <div class="og-teams">
        <span class="og-team${awCls}">${aw.shortName}</span>
        ${scoreOrAt}
        <span class="og-team${hmCls}">${hm.shortName}</span>
      </div>
      ${statusHtml}
      ${link ? '<span class="og-chev">›</span>' : ''}
    </${tag}>`;
  }

  function renderScoreboard(round) {
    const games = (round?.tournaments ?? []).filter(t => !t.isHidden);
    if (!games.length) return '';
    games.sort((a, b) => new Date(a.date) - new Date(b.date));
    return `<div class="card"><div class="sec">
      <div class="sec-title">${round.name || 'This Week'}</div>
      ${games.map(scoreRow).join('')}
    </div></div>`;
  }

  // ── Upcoming Elks games ───────────────────────────────────────────────────
  function renderUpcoming(games) {
    const now = Date.now();
    const upcoming = games
      .filter(g => involvesElks(g) && isScheduled(g) && new Date(g.date).getTime() >= now)
      .sort((a, b) => new Date(a.date) - new Date(b.date))
      .slice(1, 4);   // skip [0] — that's the featured game
    if (!upcoming.length) return '';
    const rows = upcoming.map(g => {
      const elksAway = g.awaySquad.id === ELKS_ID;
      const opp = elksAway ? g.homeSquad : g.awaySquad;
      const ha = elksAway ? '@ ' : 'vs ';
      return `<div class="up-row">
        <div class="up-match">${ha}${opp.name}</div>
        <div class="up-meta">${fmtDate(g.date)} · ${fmtTime(g.date)}</div>
      </div>`;
    }).join('');
    return `<div class="card"><div class="sec">
      <div class="sec-title">Upcoming Elks Games</div>
      ${rows}
    </div></div>`;
  }

  // ── Recent Elks results (includes pre-season) ────────────────────────────
  function renderResults(games) {
    const past = games
      .filter(g => involvesElks(g) && isComplete(g))
      .sort((a, b) => new Date(b.date) - new Date(a.date))
      .slice(0, 5);
    if (!past.length) return '';
    const rows = past.map(g => {
      const aw = g.awaySquad, hm = g.homeSquad;
      const awWon = g.winner === aw.id, hmWon = g.winner === hm.id;
      let res = 'T', resCls = 'res-t';
      if (g.winner === ELKS_ID)      { res = 'W'; resCls = 'res-w'; }
      else if (g.winner != null)     { res = 'L'; resCls = 'res-l'; }
      // Clicking a result opens the in-app box score (team/player/play-by-play)
      const open = g.id != null ? ` role="button" tabindex="0" onclick="openGameModal('${g.id}')"` : '';
      return `<div class="res-row"${open}>
        <span class="res-badge ${resCls}">${res}</span>
        <div class="res-main">
          <div class="res-line">
            <span class="og-team${aw.id === ELKS_ID ? ' elks' : ''}">${aw.shortName}</span>
            <span class="og-score ${awWon ? '' : 'dim'}">${aw.score ?? 0}</span>
            <span class="og-dash">–</span>
            <span class="og-score ${hmWon ? '' : 'dim'}">${hm.score ?? 0}</span>
            <span class="og-team${hm.id === ELKS_ID ? ' elks' : ''}">${hm.shortName}</span>
          </div>
          <div class="res-sub">${g._round?.name || ''} · ${fmtDate(g.date, { month: 'short', day: 'numeric' })}</div>
        </div>
        ${g.id != null ? '<span class="og-chev">›</span>' : ''}
      </div>`;
    }).join('');
    return `<div class="card"><div class="sec">
      <div class="sec-title">Recent Elks Results</div>
      ${rows}
    </div></div>`;
  }

  // ── Game stats (Tier 2) ───────────────────────────────────────────────────
  // The cfl.ca Game Tracker is an embedded Genius Sports widget. Its data feed
  // is public, CORS-enabled (Access-Control-Allow-Origin: *) and needs no proxy.
  // It's keyed by the same id we already have: each scoreboard tournament's `id`
  // IS the Genius fixtureId. So once we have the game id, we can pull full team
  // and player box scores. Strictly stats — these payloads carry no betting data.
  const GT_BASE = 'https://gsm-widgets.betstream.betgenius.com/widget-data/multisportgametracker';
  const gtUrl = (fixtureId, content) =>
    `${GT_BASE}?productName=democfl_light&fixtureId=${fixtureId}&activeContent=${content}` +
    `&sport=AmericanFootball&isUsingBetGeniusId=true`;

  async function gtFetch(fixtureId, content) {
    try {
      const r = await fetch(gtUrl(fixtureId, content));
      if (!r.ok) return null;
      return (await r.json())?.data || null;
    } catch (_) { return null; }
  }

  // Which Elks game has stats worth showing: live > most recent completed.
  function statsElksGame(games) {
    const elks = games.filter(involvesElks);
    return elks.find(isLive)
        || elks.filter(isComplete).sort((a, b) => new Date(b.date) - new Date(a.date))[0]
        || null;
  }

  const num = v => parseFloat(v) || 0;
  const statVal = (p, name) => (p.stats?.find(s => s.name === name) || {}).statValue ?? '';

  // Curated team-stat rows (by stable `id`), with how to read each shape.
  const TEAM_STAT_ROWS = [
    { id: 'total_net_yards',       label: 'Total yards' },
    { id: 'passing_yards',         label: 'Passing yards' },
    { id: 'rushing_yards',         label: 'Rushing yards' },
    { id: 'first_down',            label: 'First downs' },
    { id: 'third_down_efficiency', label: '3rd down', kind: 'pct' },
    { id: 'time_possession',       label: 'Possession', kind: 'time' },
    { id: 'penalties_detailed',    label: 'Penalties', kind: 'penalty' },
    { id: 'turnovers',             label: 'Turnovers' },
  ];

  function teamStatRow(stats, def) {
    const e = stats.find(s => s.id === def.id);
    if (!e) return null;
    let aDisp, hDisp, aNum, hNum;
    if (def.kind === 'pct') {
      aDisp = e.away; hDisp = e.home; aNum = e.awayPercentage || 0; hNum = e.homePercentage || 0;
    } else if (def.kind === 'time') {
      aDisp = e.away; hDisp = e.home; aNum = e.awaySeconds || 0; hNum = e.homeSeconds || 0;
    } else if (def.kind === 'penalty') {
      aDisp = `${e.away[0]}–${e.away[1]}`; hDisp = `${e.home[0]}–${e.home[1]}`;
      aNum = num(e.away[1]); hNum = num(e.home[1]);
    } else {
      aDisp = String(e.away[0]); hDisp = String(e.home[0]); aNum = num(e.away[0]); hNum = num(e.home[0]);
    }
    return { label: def.label, aDisp, hDisp, aNum, hNum };
  }

  function teamStatsHtml(stats) {
    const rows = TEAM_STAT_ROWS.map(d => teamStatRow(stats, d)).filter(Boolean);
    if (!rows.length) return '';
    return rows.map(r => {
      const total = r.aNum + r.hNum;
      const aw = total > 0 ? Math.round(r.aNum / total * 100) : 50;
      return `<div class="ts-row">
        <div class="ts-head">
          <span class="ts-val">${r.aDisp}</span>
          <span class="ts-label">${r.label}</span>
          <span class="ts-val r">${r.hDisp}</span>
        </div>
        <div class="ts-bar"><span class="ts-bar-a" style="width:${aw}%"></span><span class="ts-bar-h" style="width:${100 - aw}%"></span></div>
      </div>`;
    }).join('');
  }

  // Top performer (by yards) from a category array.
  const leader = arr => (arr && arr.length)
    ? arr.slice().sort((a, b) => num(statVal(b, 'YARDS')) - num(statVal(a, 'YARDS')))[0]
    : null;

  function passLine(p) {
    let s = `${statVal(p, 'YARDS')} yds · ${statVal(p, 'COMPLETIONS_ATTEMPTS')}`;
    if (num(statVal(p, 'TOUCHDOWNS')))    s += ` · ${statVal(p, 'TOUCHDOWNS')} TD`;
    if (num(statVal(p, 'INTERCEPTIONS'))) s += ` · ${statVal(p, 'INTERCEPTIONS')} INT`;
    return s;
  }
  function rushLine(p) {
    let s = `${statVal(p, 'YARDS')} yds · ${statVal(p, 'CARRIES')} car`;
    if (num(statVal(p, 'TOUCHDOWNS'))) s += ` · ${statVal(p, 'TOUCHDOWNS')} TD`;
    return s;
  }
  function recLine(p) {
    let s = `${statVal(p, 'YARDS')} yds · ${statVal(p, 'RECEPTIONS')} rec`;
    if (num(statVal(p, 'TOUCHDOWNS'))) s += ` · ${statVal(p, 'TOUCHDOWNS')} TD`;
    return s;
  }

  function playerRow(abbr, side, p, lineFn) {
    if (!p || !statVal(p, 'YARDS')) return '';
    return `<div class="pl-row">
      <span class="pl-team ${side}-clr">${abbr}</span>
      <span class="pl-name">${p.name} <small>#${p.number ?? ''}</small></span>
      <span class="pl-stat">${lineFn(p)}</span>
    </div>`;
  }

  function playerStatsHtml(ps, awayAbbr, homeAbbr) {
    const cats = [
      { key: 'passing',   title: 'Passing',   fn: passLine },
      { key: 'rushing',   title: 'Rushing',   fn: rushLine },
      { key: 'receiving', title: 'Receiving', fn: recLine },
    ];
    let html = '';
    for (const c of cats) {
      const a = playerRow(awayAbbr, 'a', leader(ps.awayTeam?.[c.key]), c.fn);
      const h = playerRow(homeAbbr, 'h', leader(ps.homeTeam?.[c.key]), c.fn);
      if (a || h) html += `<div class="pl-cat">${c.title} leaders</div>${a}${h}`;
    }
    return html;
  }

  function renderGameStats(team, player, fixtureId) {
    const root = team || player;
    if (!root) return '';
    const info = root.matchInfo, sb = root.scoreboardInfo;
    const awayAbbr = abbrOf(info?.awayTeam);
    const homeAbbr = abbrOf(info?.homeTeam);

    const teamHtml   = team?.teamStats ? teamStatsHtml(team.teamStats) : '';
    const playerHtml = player?.playerStats ? playerStatsHtml(player.playerStats, awayAbbr, homeAbbr) : '';
    if (!teamHtml && !playerHtml) return '';

    const status = sb?.matchStatus === 'PostMatch' ? 'Final' : 'Live';
    const click = fixtureId != null ? ` class="card gs-card" onclick="openGameModal('${fixtureId}')"` : ' class="card"';
    return `<div${click}><div class="sec">
      <div class="sec-title">Game Stats</div>
      <div class="gs-score">
        <span class="gs-ab a-clr">${awayAbbr}</span>
        <span class="gs-num">${sb?.awayScore ?? ''}</span>
        <span class="gs-dash">–</span>
        <span class="gs-num">${sb?.homeScore ?? ''}</span>
        <span class="gs-ab h-clr">${homeAbbr}</span>
      </div>
      <div class="gs-sub">${info?.roundName || ''}${info?.roundName ? ' · ' : ''}${status}</div>
      ${teamHtml}
      ${playerHtml}
      ${fixtureId != null ? '<div class="gs-more">Full box score &amp; play-by-play</div>' : ''}
    </div></div>`;
  }

  async function loadGameStats(g) {
    const el = document.getElementById('stats-section');
    if (!g || !g.id) { el.innerHTML = ''; return; }
    el.innerHTML = `<div class="card"><div class="sec">
      <div class="sec-title">Game Stats</div>
      <div class="loading" style="padding:18px 0 6px">Loading game stats…</div>
    </div></div>`;
    const [team, player] = await Promise.all([gtFetch(g.id, 'teamStats'), gtFetch(g.id, 'playerStats')]);
    el.innerHTML = renderGameStats(team, player, g.id);   // '' if nothing usable — section just disappears
  }

  // ── Full game modal: Team Stats / Player Stats / Play-by-Play ───────────────
  const esc = s => String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  const abbrOf = t => t?.details?.abbreviation || t?.abbreviation || '';

  let GM_CACHE = {};        // fixtureId → { team, player, pbp } (completed games only)
  let GM_DATA = null;       // data for the game currently open (drives paintModal)
  let GM_CURRENT = null;    // fixtureId currently shown
  let GM_TAB = 'team';      // active tab

  // Short label for the loading state (real header comes from the payload)
  function gameLabel(g) {
    if (!g) return '';
    const aw = g.awaySquad, hm = g.homeSquad;
    if (isComplete(g) || isLive(g)) return `${aw.shortName} ${aw.score ?? 0} – ${hm.score ?? 0} ${hm.shortName}`;
    return `${aw.shortName} @ ${hm.shortName}`;
  }

  function modalScoreHtml(root) {
    const info = root?.matchInfo, sb = root?.scoreboardInfo;
    const status = sb?.matchStatus === 'PostMatch' ? 'Final' : 'Live';
    return `<div class="gs-score" style="margin-top:2px">
      <span class="gs-ab a-clr">${abbrOf(info?.awayTeam)}</span>
      <span class="gs-num">${sb?.awayScore ?? ''}</span>
      <span class="gs-dash">–</span>
      <span class="gs-num">${sb?.homeScore ?? ''}</span>
      <span class="gs-ab h-clr">${abbrOf(info?.homeTeam)}</span>
    </div>
    <div class="gs-sub">${info?.roundName || ''}${info?.roundName ? ' · ' : ''}${status}</div>`;
  }

  // Player Stats tab — every player, by category (not just the leaders)
  const defLine = p => {
    const map = [['DEFENCE_SOLO', 'tkl'], ['DEFENCE_SK', 'sk'], ['DEFENCE_TFL', 'tfl'],
                 ['DEFENCE_INT', 'INT'], ['DEFENCE_FF', 'FF'], ['DEFENCE_FR', 'FR']];
    return map.filter(([k]) => num(statVal(p, k))).map(([k, l]) => `${statVal(p, k)} ${l}`).join(' · ') || '—';
  };
  const MODAL_CATS = [
    { key: 'passing',   title: 'Passing',   fn: passLine, sort: 'YARDS',        keep: p => statVal(p, 'YARDS') !== '' },
    { key: 'rushing',   title: 'Rushing',   fn: rushLine, sort: 'YARDS',        keep: p => num(statVal(p, 'CARRIES')) > 0 },
    { key: 'receiving', title: 'Receiving', fn: recLine,  sort: 'YARDS',        keep: p => num(statVal(p, 'RECEPTIONS')) > 0 || num(statVal(p, 'TARGETS')) > 0 },
    { key: 'defence',   title: 'Defence',   fn: defLine,  sort: 'DEFENCE_SOLO', keep: p => ['DEFENCE_SOLO','DEFENCE_SK','DEFENCE_TFL','DEFENCE_INT','DEFENCE_FF','DEFENCE_FR'].some(n => num(statVal(p, n))) },
  ];

  function catTeamRows(arr, side, abbr, c) {
    if (!arr) return '';
    return arr.filter(c.keep)
      .sort((a, b) => num(statVal(b, c.sort)) - num(statVal(a, c.sort)))
      .map(p => `<div class="pl-row">
        <span class="pl-team ${side}-clr">${abbr}</span>
        <span class="pl-name">${esc(p.name)} <small>#${p.number ?? ''}</small></span>
        <span class="pl-stat">${c.fn(p)}</span>
      </div>`).join('');
  }

  function modalPlayersHtml(ps, awayAbbr, homeAbbr) {
    let html = '';
    for (const c of MODAL_CATS) {
      const a = catTeamRows(ps.awayTeam?.[c.key], 'a', awayAbbr, c);
      const h = catTeamRows(ps.homeTeam?.[c.key], 'h', homeAbbr, c);
      if (a || h) html += `<div class="pl-cat">${c.title}</div>${a}${h}`;
    }
    return html || '<div class="loading">No player stats available.</div>';
  }

  // Play-by-Play tab — full game, grouped by quarter (most recent first),
  // filterable by quarter and by play category (multi-select toggle buttons).
  const QTR = { '1': '1st Quarter', '2': '2nd Quarter', '3': '3rd Quarter', '4': '4th Quarter' };
  const QTR_SHORT = { '1': '1st', '2': '2nd', '3': '3rd', '4': '4th' };
  const PBP_CATS = ['All', 'Scoring', 'Sacks', 'Turnovers'];
  let GM_PBP_QS = new Set();    // selected quarters; empty = all
  let GM_PBP_CATS = new Set();  // selected categories; empty = All

  const pbpList = pbp => pbp?.playByPlayInfo?.[''] || [];

  // Opponent abbreviation for the team running the play (for fumble-lost detection)
  function oppAbbr(teamId, teamMap) {
    const off = teamMap[teamId];
    if (!off) return null;
    for (const t of Object.values(teamMap)) if (t.side !== off.side) return t.abbr;
    return null;
  }

  // A "turnover": interception, fumble lost (to the opponent), or turnover on downs.
  // Deliberately excludes punts and other ordinary changes of possession.
  function isTurnover(p, teamMap) {
    const D = (p.description || '').toUpperCase();
    if (!D) return false;
    if (D.includes('TURNOVER ON DOWNS')) return true;
    if (D.includes('INTERCEPTED') && p.subType !== 'Penalty') return true;   // exclude penalty-negated picks
    if (p.type !== 'Punt' && D.includes('FUMBLE')) {
      const opp = oppAbbr(p.teamId, teamMap);
      if (opp && D.includes('RECOVERED BY ' + opp.toUpperCase())) return true;
    }
    return false;
  }

  function matchesCats(p, teamMap) {
    if (!GM_PBP_CATS.size) return true;   // none selected = All
    for (const c of GM_PBP_CATS) {
      if (c === 'Scoring'   && p.isScoring)            return true;
      if (c === 'Sacks'     && p.type === 'Sack')      return true;
      if (c === 'Turnovers' && isTurnover(p, teamMap)) return true;
    }
    return false;
  }

  function pbpControlsHtml(list) {
    const qs = ['1', '2', '3', '4'].filter(q => list.some(p => p.phaseQualifier === q));
    const qBtns = qs.map(q =>
      `<button class="pbp-btn${GM_PBP_QS.has(q) ? ' on' : ''}" onclick="togglePbpQuarter('${q}')">${QTR_SHORT[q]}</button>`
    ).join('');
    const cBtns = PBP_CATS.map(c => {
      const on = c === 'All' ? GM_PBP_CATS.size === 0 : GM_PBP_CATS.has(c);
      return `<button class="pbp-btn${on ? ' on' : ''}" onclick="togglePbpCat('${c}')">${c}</button>`;
    }).join('');
    return `<div class="pbp-filters">
      <div class="pbp-btns" role="group" aria-label="Filter by quarter">${qBtns}</div>
      <div class="pbp-btns" role="group" aria-label="Filter by play category">${cBtns}</div>
    </div>`;
  }

  function pbpListHtml(list, teamMap) {
    let plays = list;
    if (GM_PBP_QS.size)  plays = plays.filter(p => GM_PBP_QS.has(p.phaseQualifier));
    if (GM_PBP_CATS.size) plays = plays.filter(p => matchesCats(p, teamMap));
    if (!plays.length) return '<div class="loading">No plays match this filter.</div>';
    let html = '', curQ = null;
    for (const p of plays) {
      if (p.phaseQualifier !== curQ) {
        curQ = p.phaseQualifier;
        html += `<div class="pbp-q">${QTR[curQ] || 'Overtime'}</div>`;
      }
      const tm = teamMap[p.teamId] || { abbr: '', side: 'a' };
      html += `<div class="pbp-row${p.isScoring ? ' score' : ''}">
        <span class="pbp-clock">${esc(p.clock)}</span>
        <span class="pbp-team ${tm.side}-clr">${tm.abbr}</span>
        <span class="pbp-desc">${esc(p.description)}</span>
      </div>`;
    }
    return html;
  }

  function modalPbpHtml(pbp, teamMap) {
    const list = pbpList(pbp);
    if (!list.length) return '<div class="loading">No play-by-play available.</div>';
    return pbpControlsHtml(list) + `<div id="pbp-list">${pbpListHtml(list, teamMap)}</div>`;
  }

  // Re-render the whole play-by-play tab so the buttons reflect the new state
  function repaintPbp() {
    const data = GM_DATA;
    if (!data?.pbp) return;
    const info = (data.team || data.player || data.pbp)?.matchInfo;
    document.getElementById('gm-body').innerHTML = modalPbpHtml(data.pbp, teamMapOf(info));
  }
  function togglePbpQuarter(q) {
    GM_PBP_QS.has(q) ? GM_PBP_QS.delete(q) : GM_PBP_QS.add(q);
    repaintPbp();
  }
  function togglePbpCat(c) {
    if (c === 'All') GM_PBP_CATS.clear();
    else GM_PBP_CATS.has(c) ? GM_PBP_CATS.delete(c) : GM_PBP_CATS.add(c);
    repaintPbp();
  }

  function teamMapOf(info) {
    const m = {};
    if (info?.awayTeam) m[info.awayTeam.competitorId] = { abbr: abbrOf(info.awayTeam), side: 'a' };
    if (info?.homeTeam) m[info.homeTeam.competitorId] = { abbr: abbrOf(info.homeTeam), side: 'h' };
    return m;
  }

  function paintModal() {
    const data = GM_DATA;
    if (!data) return;
    const root = data.team || data.player || data.pbp;
    const info = root?.matchInfo;

    document.getElementById('gm-score').innerHTML = root ? modalScoreHtml(root) : '';
    document.getElementById('gm-tabs').innerHTML =
      [['team', 'Team Stats'], ['player', 'Player Stats'], ['pbp', 'Play-by-Play']]
        .map(([k, l]) => `<button class="gm-tab${GM_TAB === k ? ' active' : ''}" onclick="switchGameTab('${k}')">${l}</button>`)
        .join('');

    let body;
    if (GM_TAB === 'team') {
      body = data.team?.teamStats ? teamStatsHtml(data.team.teamStats) : '<div class="loading">Team stats not available.</div>';
    } else if (GM_TAB === 'player') {
      body = data.player?.playerStats
        ? modalPlayersHtml(data.player.playerStats, abbrOf(info?.awayTeam), abbrOf(info?.homeTeam))
        : '<div class="loading">Player stats not available.</div>';
    } else {
      body = data.pbp ? modalPbpHtml(data.pbp, teamMapOf(info)) : '<div class="loading">Play-by-play not available.</div>';
    }
    const bodyEl = document.getElementById('gm-body');
    bodyEl.innerHTML = body;
    bodyEl.scrollTop = 0;
  }

  function switchGameTab(tab) { GM_TAB = tab; paintModal(); }

  async function openGameModal(fixtureId) {
    fixtureId = String(fixtureId);
    GM_CURRENT = fixtureId;
    GM_TAB = 'team';
    GM_PBP_QS = new Set();
    GM_PBP_CATS = new Set();
    document.getElementById('gm-bd').classList.add('open');
    document.getElementById('gm-sh').classList.add('open');
    document.body.style.overflow = 'hidden';

    const g = GAMES_BY_ID[fixtureId];
    document.getElementById('gm-score').innerHTML = g ? `<div class="gs-sub" style="margin-top:6px">${esc(gameLabel(g))}</div>` : '';
    document.getElementById('gm-tabs').innerHTML = '';
    document.getElementById('gm-body').innerHTML = '<div class="loading">Loading game…</div>';

    // Live games always refetch (stats change); completed games are cached.
    const live = g && isLive(g);
    let data = live ? null : GM_CACHE[fixtureId];
    if (!data) {
      const [team, player, pbp] = await Promise.all([
        gtFetch(fixtureId, 'teamStats'),
        gtFetch(fixtureId, 'playerStats'),
        gtFetch(fixtureId, 'playByPlay'),
      ]);
      data = { team, player, pbp };
      if (!live) GM_CACHE[fixtureId] = data;
    }
    if (GM_CURRENT !== fixtureId) return;   // user closed or opened another while loading
    GM_DATA = data;

    if (!data.team && !data.player && !data.pbp) {
      document.getElementById('gm-body').innerHTML = '<div class="err">Stats aren’t available for this game yet.</div>';
      return;
    }
    paintModal();
  }

  function closeGameModal() {
    GM_CURRENT = null;
    GM_DATA = null;
    document.getElementById('gm-bd').classList.remove('open');
    document.getElementById('gm-sh').classList.remove('open');
    document.body.style.overflow = '';
  }

  // ── Main load ─────────────────────────────────────────────────────────────
  async function load() {
    const gameEl = document.getElementById('game-section');
    gameEl.innerHTML = '<div class="card"><div class="loading">Loading…</div></div>';

    document.getElementById('date-label').textContent = new Date().toLocaleDateString('en-CA', {
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });

    try {
      const [squads, rounds] = await Promise.all([fetchSquads(), fetchRounds()]);
      SQUADS = Object.fromEntries(squads.filter(s => s.id !== 0).map(s => [s.id, s]));

      const games = allGames(rounds);
      GAMES_BY_ID = Object.fromEntries(games.filter(g => g.id != null).map(g => [String(g.id), g]));

      gameEl.innerHTML = renderFeatured(featuredElksGame(games));
      document.getElementById('standings-section').innerHTML = renderStandings();
      document.getElementById('scoreboard-section').innerHTML = renderScoreboard(activeRound(rounds));
      document.getElementById('results-section').innerHTML = renderResults(games);
      document.getElementById('upcoming-section').innerHTML = renderUpcoming(games);

      // Tier 2 box score — fetched separately (different host) so it never blocks
      // or breaks the core feed; the section quietly hides if stats aren't available.
      loadGameStats(statsElksGame(games));

      document.getElementById('updated').textContent =
        'Updated at ' + new Date().toLocaleTimeString('en-CA', { hour: 'numeric', minute: '2-digit' });
    } catch (e) {
      gameEl.innerHTML = `<div class="card"><div class="err">Could not load data.<br>${e.message}</div></div>`;
    }
  }

  function manualRefresh() { load(); }

  // ── Settings overlay (About + in-app Help) ──────────────────────────────────
  // The Help section reads ttn-docs guides from docs/help/: an index.json listing
  // guide slugs, plus one Markdown file per slug with `title / category / order /
  // summary` frontmatter. Drop new guides there (e.g. via the ttn-docs skill) and
  // they appear automatically — no code change needed.

  // Lowercase, dash-separated slug — used for both category ids and heading anchors.
  function helpSlugify(t) {
    return String(t).toLowerCase().trim()
      .replace(/[^\w\s-]/g, '').replace(/\s+/g, '-').replace(/-+/g, '-');
  }

  // Pull ## / ### headings out of a body to build "on this page" / section ToCs.
  function extractHeadings(body) {
    const out = [];
    let fence = false;
    for (const line of body.split('\n')) {
      if (/^\s*```/.test(line)) { fence = !fence; continue; }
      if (fence) continue;
      const m = /^(#{2,3})\s+(.+?)\s*#*$/.exec(line);
      if (!m) continue;
      const text = m[2].trim();
      out.push({ level: m[1].length, text, id: helpSlugify(text) });
    }
    return out;
  }

  // Lightweight Markdown renderer for guide bodies. Headings get ids (prefixed
  // with `idPrefix` so several guides can share one page without colliding), and
  // internal /help/<slug> links are tagged so clicks navigate within the sheet.
  function renderGuideMarkdown(md, idPrefix = '') {
    const inline = t => esc(t)
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, txt, href) => {
        const help = href.match(/^\/help\/(.+)$/);
        if (help) return `<a href="#" data-help="${esc(help[1])}">${txt}</a>`;
        return `<a href="${esc(href)}" target="_blank" rel="noopener">${txt}</a>`;
      });
    const lines = md.split('\n');
    let html = '', list = null;
    const closeList = () => { if (list) { html += `</${list}>`; list = null; } };
    for (const raw of lines) {
      const line = raw.trimEnd();
      let m, t;
      if (/^###\s+/.test(line))                  { t = line.slice(4); closeList(); html += `<h3 id="${idPrefix}${helpSlugify(t)}">${inline(t)}</h3>`; }
      else if (/^##\s+/.test(line))              { t = line.slice(3); closeList(); html += `<h2 id="${idPrefix}${helpSlugify(t)}">${inline(t)}</h2>`; }
      else if (/^#\s+/.test(line))               { closeList(); html += `<h1>${inline(line.slice(2))}</h1>`; }
      else if ((m = line.match(/^\d+\.\s+(.*)/))) { if (list !== 'ol') { closeList(); html += '<ol>'; list = 'ol'; } html += `<li>${inline(m[1])}</li>`; }
      else if ((m = line.match(/^[-*]\s+(.*)/)))  { if (list !== 'ul') { closeList(); html += '<ul>'; list = 'ul'; } html += `<li>${inline(m[1])}</li>`; }
      else if (line.trim() === '')                { closeList(); }
      else                                        { closeList(); html += `<p>${inline(line)}</p>`; }
    }
    closeList();
    return html;
  }

  function parseGuide(slug, text) {
    const m = text.match(/^---\n([\s\S]*?)\n---\n?([\s\S]*)$/);
    const fm = {};
    let body = text;
    if (m) {
      body = m[2];
      for (const l of m[1].split('\n')) {
        const i = l.indexOf(':');
        if (i > 0) fm[l.slice(0, i).trim()] = l.slice(i + 1).trim().replace(/^["']|["']$/g, '');
      }
    }
    return {
      slug,
      title: fm.title || slug,
      category: fm.category || 'Help',
      order: parseInt(fm.order, 10) || 999,
      summary: fm.summary || '',
      body,
      headings: extractHeadings(body),
    };
  }

  // Group the (already-sorted) guides into sections, preserving order.
  function getGuidesByCategory(guides) {
    const groups = new Map();
    for (const g of guides) {
      if (!groups.has(g.category)) groups.set(g.category, []);
      groups.get(g.category).push(g);
    }
    return [...groups.entries()].map(([category, gs]) => ({ category, slug: helpSlugify(category), guides: gs }));
  }

  let _guides = null;   // cached after first load: array of parsed guides, or [] if none
  async function loadGuides() {
    if (_guides) return _guides;
    try {
      const r = await fetch('./docs/help/index.json');
      if (!r.ok) throw new Error('no index');
      const slugs = await r.json();
      const guides = await Promise.all(slugs.map(async slug => {
        try {
          const gr = await fetch(`./docs/help/${slug}.md`);
          if (!gr.ok) return null;
          return parseGuide(slug, await gr.text());
        } catch { return null; }
      }));
      // Known categories lead in this order; anything else falls back to alphabetical.
      const CAT_RANK = ['Getting started', 'Following the Elks', 'Game stats', 'Around the league'];
      const rank = c => { const i = CAT_RANK.indexOf(c); return i === -1 ? CAT_RANK.length : i; };
      _guides = guides.filter(Boolean).sort((a, b) =>
        rank(a.category) - rank(b.category) ||
        a.category.localeCompare(b.category) ||
        a.order - b.order);
    } catch {
      _guides = [];
    }
    return _guides;
  }

  function aboutCardHtml() {
    const octocat = '<svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true" style="flex-shrink:0"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>';
    return `
      <div class="set-card">
        <div class="set-card-title">About</div>
        <div class="set-app-name">Elks Score</div>
        <div class="set-desc">A lightweight tracker for the Edmonton Elks and the rest of the CFL — live scores, division standings, the weekly scoreboard, and inline team &amp; player box scores. Installable as a home-screen app.</div>
        <div class="set-links">
          <a class="set-link" href="https://github.com/timtomnow/elks-score" target="_blank" rel="noopener">${octocat}<span>github.com/timtomnow/elks-score</span></a>
          <a class="set-link accent" href="https://timtomnow.github.io/app-portfolio/" target="_blank" rel="noopener">Check out my other apps on the portfolio site →</a>
        </div>
        <div class="set-copy">© ${new Date().getFullYear()} timtomnow · not affiliated with the CFL or the Edmonton Elks</div>
      </div>`;
  }

  // ── Help: shared view fragments ─────────────────────────────────────────────
  function breadcrumbsHtml(items) {
    return `<nav class="bc">` + items.map((it, i) => {
      const sep = i > 0 ? '<span class="bc-sep">›</span>' : '';
      return it.current
        ? `${sep}<span class="bc-cur">${esc(it.label)}</span>`
        : `${sep}<a href="#" ${it.attr}>${esc(it.label)}</a>`;
    }).join('') + `</nav>`;
  }

  // The step-level (heading) list for one guide, anchoring into `idPrefix`.
  function guideStepsHtml(guide, idPrefix) {
    if (!guide.headings.length) return '';
    return `<ul class="toc-steps">` + guide.headings.map(h =>
      `<li style="padding-left:${(h.level - 2) * 12}px"><a href="#${idPrefix}${h.id}">${esc(h.text)}</a></li>`
    ).join('') + `</ul>`;
  }

  const tocBoxHtml = (title, inner) => `<div class="toc-box"><div class="toc-title">${esc(title)}</div>${inner}</div>`;

  // Markup for one guide rendered inline on a multi-guide page (section / docs).
  function guideArticleHtml(g, tag) {
    return `<${tag} id="${g.slug}" class="guide-sec">
      <div class="guide-sec-title">${esc(g.title)}</div>
      ${g.summary ? `<div class="guide-sec-sum">${esc(g.summary)}</div>` : ''}
      <div class="guide-body">${renderGuideMarkdown(g.body, g.slug + '--')}</div>
    </${tag}>`;
  }

  // ── Help: the index card (lives on the Settings home, beside About) ─────────
  function helpCardHtml(guides) {
    if (!guides.length) {
      return `<div class="set-card"><div class="set-card-title">Help guide</div>
        <div class="help-empty">No help guides have been published yet. Check back soon.</div></div>`;
    }
    const body = getGuidesByCategory(guides).map(s => `
      <a class="help-cat-link" href="#" data-section="${s.slug}">${esc(s.category)} <span>›</span></a>
      ${s.guides.map(g => `<a class="help-item" href="#" data-help="${esc(g.slug)}">
        <div class="help-item-title">${esc(g.title)}</div>
        ${g.summary ? `<div class="help-item-sum">${esc(g.summary)}</div>` : ''}
      </a>`).join('')}`).join('');
    return `<div class="set-card">
      <div class="help-card-head">
        <div class="set-card-title" style="margin:0">Help guide</div>
        <a class="help-viewall" href="#" data-all>View all docs →</a>
      </div>${body}</div>`;
  }

  // ── Help: the four views ────────────────────────────────────────────────────
  const setBody = () => document.getElementById('set-body');
  function setHelpHead(title, showBack) {
    document.getElementById('set-title').textContent = title;
    document.getElementById('set-back').hidden = !showBack;
  }

  // 1. Index — About card + the help index.
  async function renderSettingsHome() {
    setHelpHead('Settings', false);
    setBody().innerHTML = aboutCardHtml() + `<div class="set-card"><div class="set-card-title">Help guide</div><div class="loading">Loading…</div></div>`;
    const guides = await loadGuides();
    setBody().innerHTML = aboutCardHtml() + helpCardHtml(guides);
    setBody().scrollTop = 0;
  }

  // 2. Process — one guide, with an "On this page" ToC of its steps.
  async function showGuide(slug) {
    const guides = await loadGuides();
    const g = guides.find(x => x.slug === slug);
    if (!g) return renderSettingsHome();
    setHelpHead(g.title, true);
    const crumbs = breadcrumbsHtml([
      { label: 'Help', attr: 'data-home' },
      { label: g.category, attr: `data-section="${helpSlugify(g.category)}"` },
      { label: g.title, current: true },
    ]);
    const toc = g.headings.length ? tocBoxHtml('On this page', guideStepsHtml(g, '')) : '';
    setBody().innerHTML = `${crumbs}<div class="set-card">${toc}<div class="guide-body">${renderGuideMarkdown(g.body)}</div></div>`;
    setBody().scrollTop = 0;
  }

  // 3. Section — every process in one category, on one page.
  async function showSection(catSlug) {
    const guides = await loadGuides();
    const section = getGuidesByCategory(guides).find(s => s.slug === catSlug);
    if (!section) return renderSettingsHome();
    setHelpHead(section.category, true);
    const crumbs = breadcrumbsHtml([
      { label: 'Help', attr: 'data-home' },
      { label: section.category, current: true },
    ]);
    const toc = tocBoxHtml('In this section', `<ul>` + section.guides.map(g =>
      `<li><a class="toc-guide" href="#${g.slug}">${esc(g.title)}</a>${guideStepsHtml(g, g.slug + '--')}</li>`
    ).join('') + `</ul>`);
    const articles = section.guides.map(g => guideArticleHtml(g, 'section')).join('');
    setBody().innerHTML = `${crumbs}<div class="set-card">${toc}${articles}</div>`;
    setBody().scrollTop = 0;
  }

  // 4. Full docs — the entire manual on one page with a nested contents tree.
  async function showAll() {
    const guides = await loadGuides();
    const sections = getGuidesByCategory(guides);
    if (!sections.length) return renderSettingsHome();
    setHelpHead('Full help docs', true);
    const crumbs = breadcrumbsHtml([
      { label: 'Help', attr: 'data-home' },
      { label: 'Full docs', current: true },
    ]);
    const contents = tocBoxHtml('Contents', `<ul>` + sections.map(s =>
      `<li><a class="toc-sec" href="#section-${s.slug}">${esc(s.category)}</a>
        <ul class="toc-sub">` + s.guides.map(g =>
          `<li><a class="toc-guide" href="#${g.slug}">${esc(g.title)}</a>${guideStepsHtml(g, g.slug + '--')}</li>`
        ).join('') + `</ul></li>`
    ).join('') + `</ul>`);
    const body = sections.map(s => `
      <section id="section-${s.slug}" class="docs-sec">
        <div class="docs-sec-title">${esc(s.category)}</div>
        ${s.guides.map(g => guideArticleHtml(g, 'article')).join('')}
      </section>`).join('');
    setBody().innerHTML = `${crumbs}<div class="set-card">${contents}${body}</div>`;
    setBody().scrollTop = 0;
  }

  function openSettings() {
    document.getElementById('set-bd').classList.add('open');
    document.getElementById('set-sh').classList.add('open');
    document.body.style.overflow = 'hidden';
    renderSettingsHome();
  }

  function closeSettings() {
    document.getElementById('set-bd').classList.remove('open');
    document.getElementById('set-sh').classList.remove('open');
    document.body.style.overflow = '';
  }

  // Delegate clicks inside the sheet: navigate help views, or scroll to an
  // in-page anchor (the scroll container is the sheet body, not the window).
  setBody().addEventListener('click', (e) => {
    const a = e.target.closest('a');
    if (!a) return;
    if (a.hasAttribute('data-home'))    { e.preventDefault(); return renderSettingsHome(); }
    if (a.hasAttribute('data-all'))     { e.preventDefault(); return showAll(); }
    if (a.hasAttribute('data-section')) { e.preventDefault(); return showSection(a.getAttribute('data-section')); }
    if (a.hasAttribute('data-help'))    { e.preventDefault(); return showGuide(a.getAttribute('data-help')); }
    const href = a.getAttribute('href') || '';
    if (href.length > 1 && href.startsWith('#')) {
      const el = document.getElementById(decodeURIComponent(href.slice(1)));
      if (el) { e.preventDefault(); el.scrollIntoView({ behavior: 'smooth', block: 'start' }); }
    }
  });

  // Self-rescheduling refresh: 30 s when a game is live, otherwise 5 min
  function scheduleRefresh() {
    const live = !!document.querySelector('.b-live') || !!document.querySelector('.og-live');
    setTimeout(async () => {
      await load();
      scheduleRefresh();
    }, live ? 30_000 : 300_000);
  }
  scheduleRefresh();

  load();
</script>
<script>
  // Registering a service worker (with a fetch handler) is what lets Android
  // browsers offer "Install app" instead of just a home-screen shortcut.
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
